<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SX Bingo</title>
<meta name="theme-color" content="#8B0000">
<link rel="manifest" href="data:application/manifest+json,{
  &quot;name&quot;:&quot;SX Bingo&quot;,
  &quot;short_name&quot;:&quot;SX Bingo&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#0a0a1a&quot;,
  &quot;theme_color&quot;:&quot;#8B0000&quot;,
  &quot;icons&quot;:[
    {&quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/847/847969.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;},
    {&quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/847/847969.png&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;}
  ]
}">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a0505 100%);min-height:100vh;padding:16px;color:white;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:2.4em;font-weight:900;letter-spacing:3px;}
.s{color:#ff1a1a;text-shadow:0 0 18px rgba(255,30,30,0.9);}.x{color:#ffffff;}
.rest{background:linear-gradient(90deg,#ff2222,#ff8800,#ffd700,#ff8800,#ff2222);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:brilhoBingo 2.5s linear infinite;}@keyframes brilhoBingo{0%{background-position:0% center;}100%{background-position:200% center;}}
.header p{font-size:11px;color:#555;letter-spacing:3px;margin-top:4px;}

.sorteio-badge{display:inline-block;margin-top:8px;padding:6px 22px;border-radius:30px;font-size:15px;font-weight:bold;letter-spacing:3px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);color:#ffd700;transition:all 0.5s;}
.sorteio-badge span{font-size:24px;font-weight:900;color:#fff;margin-left:8px;}

.fb-badge{text-align:center;font-size:12px;margin-bottom:10px;padding:6px;border-radius:8px;font-weight:bold;display:none;}
.fb-ok{color:#4caf50;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);}
.fb-err{color:#ff6b6b;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);display:block!important;}

.btn-actions{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}

.btn-som{padding:10px 22px;border-radius:30px;font-size:13px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;border:none;}
.btn-som.mudo{background:linear-gradient(135deg,#ff0000,#cc0000);color:white;box-shadow:0 0 28px rgba(255,0,0,0.8);animation:pulseMudo 1.2s ease-in-out infinite;}
@keyframes pulseMudo{0%,100%{box-shadow:0 0 18px rgba(255,0,0,0.6);transform:scale(1);}50%{box-shadow:0 0 45px rgba(255,0,0,0.95);transform:scale(1.03);}}
.btn-som.ativo{background:linear-gradient(135deg,#0077ff,#0044cc);color:white;box-shadow:0 0 22px rgba(0,119,255,0.7);animation:pulseAtivo 2s ease-in-out infinite;}
@keyframes pulseAtivo{0%,100%{box-shadow:0 0 16px rgba(0,119,255,0.5);}50%{box-shadow:0 0 36px rgba(0,119,255,0.9);}}

.btn-instalar{padding:10px 22px;border-radius:30px;font-size:13px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:all 0.2s;display:none;align-items:center;gap:6px;border:none;background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;box-shadow:0 0 20px rgba(255,215,0,0.5);}
.btn-instalar.visivel{display:inline-flex;}

.narrador-box{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.2);border-radius:12px;padding:14px 20px;text-align:center;margin-bottom:14px;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.narrador-txt{font-size:20px;font-weight:bold;color:#555;letter-spacing:1px;}
.narrador-box.falando{background:rgba(255,215,0,0.13);border-color:#ffd700;box-shadow:0 0 22px rgba(255,215,0,0.25);}
.narrador-box.falando .narrador-txt{color:#ffd700;}
.status-bar{border-radius:12px;padding:12px 20px;text-align:center;margin-bottom:16px;font-size:16px;font-weight:bold;border:2px solid;}
.aguardando{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:#555;}
.ativo{background:rgba(76,175,80,0.1);border-color:#4caf50;color:#4caf50;}
.finalizado{background:rgba(255,215,0,0.1);border-color:#ffd700;color:#ffd700;}
.bola-grande{width:110px;height:110px;background:radial-gradient(circle at 35% 35%,#cc2200,#8B0000 60%,#440000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:900;box-shadow:0 0 30px rgba(139,0,0,0.5);border:3px solid rgba(255,255,255,0.15);transition:all 0.3s; margin: 0 auto;}
.bola-grande.flash{box-shadow:0 0 70px rgba(255,215,0,1);border-color:#ffd700;transform:scale(1.12);}
.secao{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.07);}
.secao-titulo{color:#ffd700;font-size:11px;letter-spacing:3px;margin-bottom:10px;font-weight:bold;}
.bolas-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.bola{width:44px;height:44px;background:radial-gradient(circle at 35% 35%,#cc2200,#8B0000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.bola.ultima{box-shadow:0 0 18px #ffd700;border:2px solid #ffd700;transform:scale(1.14);}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 16px;text-align:center;border:1px solid rgba(255,255,255,0.07);min-width:80px;}
.stat-val{font-size:22px;font-weight:900;}
.stat-label{font-size:10px;color:#555;letter-spacing:2px;margin-top:2px;}
.tabela-wrap{background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);margin-bottom:20px;}
.tabela-header{display:grid;grid-template-columns:52px 70px 1fr auto auto;background:rgba(139,0,0,0.6);padding:12px 14px;font-size:11px;font-weight:bold;letter-spacing:2px;color:#ffd700;align-items:center;gap:10px;}
@media(max-width:500px){.tabela-header{display:none;}}
.tabela-row{display:grid;grid-template-columns:52px 70px 1fr auto auto;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.05);align-items:center;gap:10px;transition:all 0.4s;}
@media(max-width:500px){
  .tabela-row{grid-template-columns:72px 1fr;grid-template-rows:auto auto auto;column-gap:12px;row-gap:6px;padding:14px 12px;}
  .cel-foto{grid-column:1;grid-row:1/3;}
  .cel-nome{grid-column:2;grid-row:1;}
  .cel-acertos{grid-column:2;grid-row:2;display:flex;align-items:center;gap:8px;}
  .cel-valor{grid-column:1/3;grid-row:3;background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
}
.jogador-foto{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.2);display:block;}
.jogador-foto-vazia{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:24px;}
.nome-txt{font-size:18px;font-weight:900;color:#fff;}
.barra-acertos{height:3px;background:rgba(255,255,255,0.07);border-radius:3px;margin-top:5px;max-width:160px;}
.barra-fill{height:100%;background:linear-gradient(90deg,#8B0000,#ff6b6b);border-radius:3px;transition:width 0.6s;}
.acertos-badge{display:inline-block;background:rgba(139,0,0,0.4);border:1px solid rgba(255,107,107,0.35);color:#ff9999;border-radius:20px;padding:4px 12px;font-size:14px;font-weight:700;}
.cartelas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:20px;}
.cartela{background:#8B0000;border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,0.3);border:2px solid transparent;}
.cartela.winner{border-color:#ffd700;box-shadow:0 0 28px rgba(255,215,0,0.5);}
.cartela-player-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.cartela-foto{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #ffd700;}
.cartela-numbers{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.num{background:rgba(255,255,255,0.12);color:white;padding:9px 3px;text-align:center;border-radius:6px;font-size:18px;font-weight:bold;}
.num.marked{background:#4caf50;box-shadow:0 0 8px rgba(76,175,80,0.6);transform:scale(1.04);}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4caf50;margin-right:8px;animation:pulseAnim 1.5s infinite;}
@keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.8);}}
</style>
</head>
<body>

<div class="header">
  <h1><span class="s">S</span><span class="x">X</span><span class="rest"> BINGO</span></h1>
  <p>SÉRIE BRONZE — AO VIVO</p>
  <div class="sorteio-badge">SORTEIO <span id="numSorteio">1</span></div>
</div>

<div id="fbBadge" class="fb-badge fb-ok">🔥 Conectando ao Firebase...</div>

<div class="btn-actions">
  <button class="btn-som mudo" id="btnSom" onclick="ativarSom()">🔇 Clique para ativar audio</button>
  <button class="btn-instalar" id="btnInstalar">📲 Instalar App</button>
</div>

<div class="narrador-box" id="narradorBox"><div class="narrador-txt" id="narradorTxt">— narrador aguardando —</div></div>
<div id="statusBar" class="status-bar aguardando"><span class="pulse"></span> Aguardando sorteio...</div>

<div class="ultimo-numero"><div class="bola-grande" id="bolaGrande">?</div></div>

<div class="secao">
  <div class="secao-titulo">NÚMEROS SORTEADOS</div>
  <div class="bolas-wrap" id="bolasWrap"></div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="stS" style="color:#8B0000;">0</div><div class="stat-label">SORTEADOS</div></div>
  <div class="stat"><div class="stat-val" id="stR" style="color:#ffd700;">90</div><div class="stat-label">RESTANTES</div></div>
  <div class="stat"><div class="stat-val" id="stTotal" style="color:#4caf50;">R$0</div><div class="stat-label">TOTAL PAGO</div></div>
  <div class="stat"><div class="stat-val" id="stLider" style="color:#ff6b6b;">—</div><div class="stat-label">LÍDER</div></div>
</div>

<div class="tabela-wrap" id="tabelaBody"></div>
<div class="cartelas-grid" id="cartelasGrid"></div>

<script>
  // PWA & SERVICE WORKER
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('btnInstalar').classList.add('visivel'); });
  document.getElementById('btnInstalar').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } });
  if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{});`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }

  // ÁUDIO & VOZ
  var somAtivo = false;
  var audioCtx = null;
  var gainMaster = null;
  var vozEscolhida = null;
  var filaFala = [];
  var estaFalando = false;

  function ativarSom() {
    if (!somAtivo) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainMaster = audioCtx.createGain(); gainMaster.gain.value = 3.0; gainMaster.connect(audioCtx.destination);
      } catch(e){}
      carregarVozes(); somAtivo = true;
      document.getElementById('btnSom').className = 'btn-som ativo';
      document.getElementById('btnSom').textContent = '🔊 Áudio ativado';
      falar('S X Bingo Oficial. Série bronze pronto!', true);
    } else {
      somAtivo = false; window.speechSynthesis.cancel();
      document.getElementById('btnSom').className = 'btn-som mudo';
      document.getElementById('btnSom').textContent = '🔇 Clique para ativar audio';
    }
  }

  function carregarVozes() {
    var todas = window.speechSynthesis.getVoices();
    vozEscolhida = todas.find(v => v.lang.startsWith('pt-BR')) || todas.find(v => v.lang.startsWith('pt')) || null;
  }
  window.speechSynthesis.onvoiceschanged = carregarVozes;

  function falar(texto, prioridade) {
    if (!somAtivo) return;
    if (prioridade) { window.speechSynthesis.cancel(); filaFala = []; estaFalando = false; }
    filaFala.push(texto); processarFila();
  }

  function processarFila() {
    if (estaFalando || filaFala.length === 0) return;
    estaFalando = true;
    var texto = filaFala.shift();
    document.getElementById('narradorTxt').textContent = texto;
    document.getElementById('narradorBox').classList.add('falando');
    var u = new SpeechSynthesisUtterance(texto);
    u.lang = 'pt-BR'; u.rate = 0.95; if (vozEscolhida) u.voice = vozEscolhida;
    u.onend = () => { estaFalando = false; document.getElementById('narradorBox').classList.remove('falando'); processarFila(); };
    window.speechSynthesis.speak(u);
  }

  function tocarPing() {
    if (!audioCtx) return;
    [520, 660, 820].forEach((f, i) => {
      var osc = audioCtx.createOscillator(); var g = audioCtx.createGain();
      osc.connect(g); g.connect(gainMaster); osc.frequency.value = f;
      g.gain.setValueAtTime(0.4, audioCtx.currentTime + (i*0.1));
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i*0.1) + 0.3);
      osc.start(audioCtx.currentTime + (i*0.1)); osc.stop(audioCtx.currentTime + (i*0.1) + 0.4);
    });
  }

  function tocarFanfarra() {
    if (!audioCtx) return;
    [523, 659, 784, 1047].forEach((f, i) => {
      var osc = audioCtx.createOscillator(); var g = audioCtx.createGain();
      osc.connect(g); g.connect(gainMaster); osc.frequency.value = f;
      g.gain.setValueAtTime(0.4, audioCtx.currentTime + (i*0.15));
      osc.start(audioCtx.currentTime + (i*0.15)); osc.stop(audioCtx.currentTime + (i*0.15) + 0.4);
    });
  }

  // LÓGICA DE SORTEIO
  var filaNumeros = [];
  var anunciandoNumero = false;
  var numerosVisiveis = [];

  function enfileirarNumero(n) { filaNumeros.push(n); processarFilaNumeros(); }

  function processarFilaNumeros() {
    if (anunciandoNumero || filaNumeros.length === 0) return;
    anunciandoNumero = true;
    var n = filaNumeros.shift();
    
    tocarPing();
    // SINCRONIA: Visual e Áudio juntos
    atualizarBolaGrande(n); 
    falar('Número... ' + n + '!');
    
    setTimeout(() => { anunciandoNumero = false; processarFilaNumeros(); }, 2000);
  }

  function atualizarBolaGrande(n) {
    document.getElementById('bolaGrande').textContent = n;
    document.getElementById('bolaGrande').classList.add('flash');
    setTimeout(() => document.getElementById('bolaGrande').classList.remove('flash'), 800);
    if(!numerosVisiveis.includes(n)) numerosVisiveis.push(n);
    document.getElementById('bolasWrap').innerHTML = numerosVisiveis.map(x => `<div class="bola ${x===n?'ultima':''}">${x}</div>`).join('');
    document.getElementById('stS').textContent = numerosVisiveis.length;
    document.getElementById('stR').textContent = 90 - numerosVisiveis.length;
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const cfg = {
    apiKey: "AIzaSyCXTQ932v0Amnbtha01BzFsUfUZKnwYQIA",
    authDomain: "chofer-522be.firebaseapp.com",
    databaseURL: "https://chofer-522be-default-rtdb.firebaseio.com",
    projectId: "chofer-522be",
    appId: "1:81306033578:web:0c3688bc455a51b972dfd3"
  };

  const db = getDatabase(initializeApp(cfg));
  let lastDrawnLen = 0;
  let statusAntigo = '';
  let state = { game: null, fotos: {} };

  onValue(ref(db, 'bingo_bronze/fotos'), snap => { state.fotos = snap.val() || {}; if(state.game) render(); });

  onValue(ref(db, 'bingo_bronze/game'), snap => {
    const g = snap.val(); if(!g) return;
    state.game = g;
    const drawn = g.drawn || [];
    
    if (drawn.length > lastDrawnLen) { enfileirarNumero(drawn[drawn.length-1]); }

    // PRÊMIO TRAVADO EM R$ 10,00 NA FALA
    if (g.status === 'finalizado' && statusAntigo !== 'finalizado') {
      tocarFanfarra();
      const max = Math.max(...g.cartelas.map(c => c.score));
      const winners = g.cartelas.filter(c => c.score === max);
      const premioParaFala = (10 / winners.length).toFixed(2);
      falar("Bingo! Vitória de " + winners.map(w=>w.name).join(' e ') + "! Prêmio de " + premioParaFala + " reais para cada!", true);
    }
    
    lastDrawnLen = drawn.length; statusAntigo = g.status; render();
  });

  function render() {
    const g = state.game; const cartelas = g.cartelas || [];
    const sorted = [...cartelas].sort((a,b) => b.score - a.score);
    
    document.getElementById('stTotal').textContent = "R$ 10.00"; // Visual fixo também
    document.getElementById('stLider').textContent = sorted[0]?.name?.split(' ')[0] || '—';

    document.getElementById('tabelaBody').innerHTML = sorted.map(c => {
      const foto = state.fotos[c.id] ? `<img src="${state.fotos[c.id]}" class="jogador-foto">` : `<div class="jogador-foto-vazia">👤</div>`;
      return `<div class="tabela-row">
        <div style="color:#555">C${c.id}</div>
        <div class="cel-foto">${foto}</div>
        <div class="cel-nome"><div class="nome-txt">${c.name}</div><div class="barra-acertos"><div class="barra-fill" style="width:${(c.score/16)*100}%"></div></div></div>
        <div class="cel-acertos"><span class="acertos-badge">${c.score}/16</span></div>
        <div class="cel-valor">R$ 10.00</div>
      </div>`;
    }).join('');

    document.getElementById('cartelasGrid').innerHTML = cartelas.map(c => {
      // MARCAÇÃO REAL BASEADA NO FIREBASE
      const marked = Array.isArray(c.markedNumbers) ? c.markedNumbers : [];
      const foto = state.fotos[c.id] ? `<img src="${state.fotos[c.id]}" class="cartela-foto">` : `👤`;
      return `<div class="cartela ${g.status==='finalizado' && c.score>=16 ? 'winner' : ''}">
        <div class="cartela-player-wrap">${foto} <span class="cartela-player">${c.name}</span></div>
        <div class="cartela-numbers">${(c.numbers || []).map(n => `<div class="num ${marked.includes(n)?'marked':''}">${n}</div>`).join('')}</div>
        <div style="margin-top:10px; font-size:12px; opacity:0.6">Acertos: ${c.score}/16</div>
      </div>`;
    }).join('');

    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar ' + g.status;
    bar.textContent = g.status === 'ativo' ? 'SORTEIO EM ANDAMENTO' : (g.status === 'finalizado' ? 'FINALIZADO' : 'AGUARDANDO');
  }
</script>
</body>
</html>
