<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SX Bingo</title>
<meta name="theme-color" content="#8B0000">
<link rel="manifest" id="manifestLink">
<script>
/** * CONFIGURAÇÃO DO ÍCONE E MANIFESTO 
 * 'maskable' ajuda a remover o ícone do google sobreposto em alguns sistemas
 */
const svgIcon192 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#8B0000"/><text x="96" y="138" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="108" fill="white">SX</text></svg>`;
const svgIcon512 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="80" fill="#8B0000"/><text x="256" y="370" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="290" fill="white">SX</text></svg>`;
const icon192 = 'data:image/svg+xml,' + encodeURIComponent(svgIcon192);
const icon512 = 'data:image/svg+xml,' + encodeURIComponent(svgIcon512);

const manifest = {
  name: "SX Bingo",
  short_name: "SX Bingo",
  start_url: ".",
  display: "standalone",
  background_color: "#0a0a1a",
  theme_color: "#8B0000",
  icons: [
    { src: icon192, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
    { src: icon512, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const mblob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
document.getElementById('manifestLink').href = URL.createObjectURL(mblob);
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a0505 100%);min-height:100vh;padding:16px;color:white;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:2.4em;font-weight:900;letter-spacing:3px;}
.s{color:#ff1a1a;text-shadow:0 0 18px rgba(255,30,30,0.9);}.x{color:#ffffff;}
.rest{background:linear-gradient(90deg,#ff2222,#ff8800,#ffd700,#ff8800,#ff2222);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:brilhoBingo 2.5s linear infinite;}
@keyframes brilhoBingo{0%{background-position:0% center;}100%{background-position:200% center;}}
.header p{font-size:11px;color:#555;letter-spacing:3px;margin-top:4px;}
.sorteio-badge{display:inline-block;margin-top:8px;padding:6px 22px;border-radius:30px;font-size:15px;font-weight:bold;letter-spacing:3px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);color:#ffd700;}
.sorteio-badge span{font-size:24px;font-weight:900;color:#fff;margin-left:8px;}
.fb-badge{text-align:center;font-size:12px;margin-bottom:10px;padding:6px;border-radius:8px;font-weight:bold;display:none;}
.fb-ok{color:#4caf50;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);}
.fb-err{color:#ff6b6b;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);display:block!important;}
.btn-actions{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.btn-som{padding:10px 22px;border-radius:30px;font-size:13px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;border:none;}
.btn-som.mudo{background:linear-gradient(135deg,#ff0000,#cc0000);color:white;box-shadow:0 0 28px rgba(255,0,0,0.8);animation:pulseMudo 1.2s ease-in-out infinite;}
@keyframes pulseMudo{0%,100%{box-shadow:0 0 18px rgba(255,0,0,0.6);transform:scale(1);}50%{box-shadow:0 0 45px rgba(255,0,0,0.95);transform:scale(1.03);}}
.btn-som.ativo{background:linear-gradient(135deg,#0077ff,#0044cc);color:white;box-shadow:0 0 22px rgba(0,119,255,0.7);animation:pulseAtivo 2s ease-in-out infinite;}
@keyframes pulseAtivo{0%,100%{box-shadow:0 0 16px rgba(0,119,255,0.5);}50%{box-shadow:0 0 36px rgba(0,119,255,0.9);}}

/* Botão instalar corrigido */
.btn-instalar{padding:10px 22px;border-radius:30px;font-size:13px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:all 0.2s;display:none;align-items:center;gap:8px;border:none;background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;box-shadow:0 0 20px rgba(255,215,0,0.5);}
.btn-instalar:hover{transform:scale(1.04);box-shadow:0 0 32px rgba(255,215,0,0.8);}
.btn-instalar.visivel{display:inline-flex;}
.sx-icon{width:26px;height:26px;border-radius:6px;background:#8B0000;display:inline-flex;align-items:center;justify-content:center;font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:11px;color:white;letter-spacing:-1px;flex-shrink:0;}

.narrador-box{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.2);border-radius:12px;padding:14px 20px;text-align:center;margin-bottom:14px;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.narrador-txt{font-size:20px;font-weight:bold;color:#555;letter-spacing:1px;}
.narrador-box.falando{background:rgba(255,215,0,0.13);border-color:#ffd700;box-shadow:0 0 22px rgba(255,215,0,0.25);}
.narrador-box.falando .narrador-txt{color:#ffd700;}
.status-bar{border-radius:12px;padding:12px 20px;text-align:center;margin-bottom:16px;font-size:16px;font-weight:bold;border:2px solid;}
.aguardando{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:#555;}
.ativo{background:rgba(76,175,80,0.1);border-color:#4caf50;color:#4caf50;}
.finalizado{background:rgba(255,215,0,0.1);border-color:#ffd700;color:#ffd700;}
.ultimo-numero{display:flex;justify-content:center;margin-bottom:16px;}
.bola-grande{width:110px;height:110px;background:radial-gradient(circle at 35% 35%,#cc2200,#8B0000 60%,#440000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:900;box-shadow:0 0 30px rgba(139,0,0,0.5);border:3px solid rgba(255,255,255,0.15);transition:all 0.3s;}
.bola-grande.flash{box-shadow:0 0 70px rgba(255,215,0,1);border-color:#ffd700;transform:scale(1.12);}
.secao{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.07);}
.secao-titulo{color:#ffd700;font-size:11px;letter-spacing:3px;margin-bottom:10px;font-weight:bold;}
.bolas-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.bola{width:44px;height:44px;background:radial-gradient(circle at 35% 35%,#cc2200,#8B0000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.bola.ultima{box-shadow:0 0 18px #ffd700;border:2px solid #ffd700;transform:scale(1.14);}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 16px;text-align:center;border:1px solid rgba(255,255,255,0.07);min-width:80px;}
.stat-val{font-size:22px;font-weight:900;}
.stat-label{font-size:10px;color:#555;letter-spacing:2px;margin-top:2px;}
.tabela-wrap{background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);margin-bottom:20px;}
/* Estilos da tabela e cartelas mantidos conforme original... */
</style>
</head>

<script>
  // ─── PWA AJUSTADO ──────────────────────────────────────────────────────────
  let deferredPrompt = null;
  const btnInstalar = document.getElementById('btnInstalar');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // O botão só aparece se a instalação for possível
    btnInstalar.classList.add('visivel');
  });

  btnInstalar.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    // Oculta após a escolha (independente de aceitar ou não)
    btnInstalar.classList.remove('visivel');
    deferredPrompt = null;
  });

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    btnInstalar.classList.remove('visivel');
    console.log('PWA instalado com sucesso');
  });

  if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{});`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }

  // ─── LÓGICA DE SORTEIO (AJUSTADA PARA 1 A 10) ──────────────────────────────
  var filaNumeros=[], anunciandoNumero=false, pendingFimAnuncio=null, numerosVisiveis=[];

  function enfileirarNumero(n){ filaNumeros.push(n); processarFilaNumeros(); }

  function atualizarBolaGrande(n){
    var bolaG = document.getElementById('bolaGrande');
    if(!bolaG) return;
    bolaG.textContent = n;
    bolaG.classList.add('flash');
    setTimeout(function(){ bolaG.classList.remove('flash'); }, 900);
    
    numerosVisiveis.push(n);
    var wrap = document.getElementById('bolasWrap');
    if(wrap) wrap.innerHTML = numerosVisiveis.map(function(x){
      return '<div class="bola'+(x===n?' ultima':'')+'">'+x+'</div>';
    }).join('');

    var stS = document.getElementById('stS'), stR = document.getElementById('stR');
    if(stS) stS.textContent = numerosVisiveis.length;
    // Ajuste aqui: 10 - sorteados
    if(stR) stR.textContent = Math.max(0, 10 - numerosVisiveis.length);
  }

  // Restante das funções de áudio (tocarPing, falar, etc) seguem o seu padrão...

</script>
