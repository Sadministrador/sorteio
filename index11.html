<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SX Bingo</title>
<meta name="theme-color" content="#8B0000">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a0505 100%);min-height:100vh;padding:16px;color:white;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:2.4em;font-weight:900;letter-spacing:3px;}
.s{color:#ff1a1a;text-shadow:0 0 18px rgba(255,30,30,0.9);}.x{color:#ffffff;}
.rest{background:linear-gradient(90deg,#ff2222,#ff8800,#ffd700,#ff8800,#ff2222);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:brilhoBingo 2.5s linear infinite;}@keyframes brilhoBingo{0%{background-position:0% center;}100%{background-position:200% center;}}
.header p{font-size:11px;color:#555;letter-spacing:3px;margin-top:4px;}
.sorteio-badge{display:inline-block;margin-top:8px;padding:6px 22px;border-radius:30px;font-size:15px;font-weight:bold;letter-spacing:3px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);color:#ffd700;}
.sorteio-badge span{font-size:24px;font-weight:900;color:#fff;margin-left:8px;}
.fb-badge{text-align:center;font-size:12px;margin-bottom:10px;padding:6px;border-radius:8px;font-weight:bold;}
.fb-ok{color:#4caf50;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);}
.btn-actions{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.btn-som{padding:12px 26px;border-radius:30px;font-size:14px;font-weight:bold;cursor:pointer;transition:all 0.2s;border:none;outline:none;}
.btn-som.mudo{background:linear-gradient(135deg,#ff0000,#cc0000);color:white;box-shadow:0 0 20px rgba(255,0,0,0.6);animation:pulse 1.5s infinite;}
.btn-som.ativo{background:linear-gradient(135deg,#0077ff,#0044cc);color:white;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
.narrador-box{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.2);border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;min-height:52px;display:flex;align-items:center;justify-content:center;}
.narrador-txt{font-size:20px;font-weight:bold;color:#555;}
.narrador-box.falando .narrador-txt{color:#ffd700;}
.status-bar{border-radius:12px;padding:12px;text-align:center;margin-bottom:16px;font-size:16px;font-weight:bold;border:2px solid;}
.aguardando{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:#555;}
.ativo{background:rgba(76,175,80,0.1);border-color:#4caf50;color:#4caf50;}
.finalizado{background:rgba(255,215,0,0.1);border-color:#ffd700;color:#ffd700;}
.ultimo-numero{display:flex;justify-content:center;margin-bottom:16px;}
.bola-grande{width:110px;height:110px;background:radial-gradient(circle at 35% 35%,#cc2200,#8B0000 60%,#440000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:900;box-shadow:0 0 30px rgba(139,0,0,0.5);border:3px solid rgba(255,255,255,0.15);}
.bola-grande.flash{box-shadow:0 0 70px rgba(255,215,0,1);border-color:#ffd700;}
.secao{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.07);}
.bolas-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.bola{width:40px;height:40px;background:radial-gradient(circle at 35% 35%,#cc2200,#8B0000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.bola.ultima{border:2px solid #ffd700;box-shadow:0 0 15px #ffd700;}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;min-width:80px;}
.tabela-wrap{background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);margin-bottom:20px;}
.tabela-row{display:grid;grid-template-columns:50px 60px 1fr 80px;padding:12px;border-bottom:1px solid rgba(255,255,255,0.05);align-items:center;}
.cartelas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;}
.cartela{background:#8B0000;border-radius:12px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.cartela-numbers{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px;}
.num{background:rgba(255,255,255,0.1);padding:8px;text-align:center;border-radius:5px;font-weight:bold;}
.num.marked{background:#4caf50;}
.jogador-foto-vazia{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="header">
  <h1><span class="s">S</span><span class="x">X</span><span class="rest"> BINGO</span></h1>
  <p>SÉRIE BRONZE — AO VIVO</p>
  <div class="sorteio-badge">SORTEIO <span id="numSorteioDisplay">1</span></div>
</div>

<div id="fbBadge" class="fb-badge fb-ok" style="background: rgba(255,0,0,0.1); color: red;">⏳ Conectando ao Firebase...</div>

<div class="btn-actions">
  <button class="btn-som mudo" id="btnSom" onclick="ativarSom()">
    🔇 Ativar Áudio Masculino
  </button>
</div>

<div class="narrador-box" id="narradorBox">
  <div class="narrador-txt" id="narradorTxt">— narrador aguardando —</div>
</div>

<div id="statusBar" class="status-bar aguardando">Aguardando sorteio...</div>

<div class="ultimo-numero">
  <div class="bola-grande" id="bolaGrande">?</div>
</div>

<div class="secao">
  <div class="bolas-wrap" id="bolasWrap"></div>
</div>

<div class="stats">
  <div class="stat"><div id="stS">0</div><div style="font-size:10px">SORTEADOS</div></div>
  <div class="stat"><div id="stR">90</div><div style="font-size:10px">RESTANTES</div></div>
  <div class="stat"><div id="stTotal">R$0</div><div style="font-size:10px">TOTAL</div></div>
</div>

<div id="tabelaBody" class="tabela-wrap"></div>

<div class="cartelas-grid" id="cartelasGrid"></div>

<script>
  var somAtivo = false;
  var audioCtx = null;
  var gainMaster = null;
  var estaFalando = false;
  var filaFala = [];
  var vozEscolhida = null;
  
  // Persistência do número do sorteio
  var numSorteio = parseInt(localStorage.getItem('sx_bingo_n_sorteio')) || 1;
  var ultimaListaJogadores = localStorage.getItem('sx_bingo_jogadores_hash') || "";

  function salvarSorteio() {
    localStorage.setItem('sx_bingo_n_sorteio', numSorteio);
    document.getElementById('numSorteioDisplay').textContent = numSorteio;
  }

  function ativarSom() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainMaster = audioCtx.createGain();
      gainMaster.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (!somAtivo) {
      somAtivo = true;
      document.getElementById('btnSom').innerHTML = '🔊 Áudio Ativado';
      document.getElementById('btnSom').className = 'btn-som ativo';
      
      var carregarVozes = () => {
        var vozes = window.speechSynthesis.getVoices();
        vozEscolhida = vozes.find(v => v.lang.startsWith('pt') && (v.name.includes('Male') || v.name.includes('Google'))) || vozes.find(v => v.lang.startsWith('pt'));
      };
      carregarVozes();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = carregarVozes;
      }
      
      tocarPing();
    } else {
      somAtivo = false;
      window.speechSynthesis.cancel();
      document.getElementById('btnSom').innerHTML = '🔇 Ativar Áudio Masculino';
      document.getElementById('btnSom').className = 'btn-som mudo';
    }
  }

  function falar(texto) {
    if (!somAtivo) return;
    filaFala.push(texto);
    if (!estaFalando) processarFila();
  }

  function processarFila() {
    if (estaFalando || filaFala.length === 0) return;
    estaFalando = true;
    var texto = filaFala.shift();
    var msg = new SpeechSynthesisUtterance(texto);
    msg.lang = 'pt-BR';
    msg.pitch = 0.85; 
    msg.rate = 1.0; // Velocidade normal para ser mais rápido
    if (vozEscolhida) msg.voice = vozEscolhida;
    
    msg.onstart = () => { 
      document.getElementById('narradorBox').classList.add('falando'); 
      document.getElementById('narradorTxt').textContent = texto; 
    };
    msg.onend = () => { 
      estaFalando = false; 
      document.getElementById('narradorBox').classList.remove('falando'); 
      processarFila(); 
    };
    window.speechSynthesis.speak(msg);
  }

  function tocarPing() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(gainMaster);
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  }

  document.getElementById('numSorteioDisplay').textContent = numSorteio;
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const cfg = {
    apiKey: "AIzaSyCXTQ932v0Amnbtha01BzFsUfUZKnwYQIA",
    authDomain: "chofer-522be.firebaseapp.com",
    databaseURL: "https://chofer-522be-default-rtdb.firebaseio.com",
    projectId: "chofer-522be",
    storageBucket: "chofer-522be.firebasestorage.app",
    messagingSenderId: "81306033578",
    appId: "1:81306033578:web:0c3688bc455a51b972dfd3"
  };

  const db = getDatabase(initializeApp(cfg));
  let lastDrawnCount = 0;
  let statusAnterior = "";

  onValue(ref(db, 'bingo_bronze/game'), snap => {
    const g = snap.val();
    if (!g) return;

    // Feedback de conexão
    const badge = document.getElementById('fbBadge');
    badge.textContent = "✅ Conectado ao Bingo";
    badge.style.background = "rgba(76, 175, 80, 0.1)";
    badge.style.color = "#4caf50";
    
    const drawn = g.drawn || [];
    const cartelas = g.cartelas || [];

    // --- LÓGICA DE TROCA DE SORTEIO ---
    // Se a lista de números foi esvaziada e antes tinha números, significa que limpou o sorteador.
    if (drawn.length === 0 && lastDrawnCount > 0) {
      numSorteio++;
      salvarSorteio();
      falar("Iniciando novo sorteio. Sorteio número " + numSorteio);
    }

    // Se a lista de participantes mudou radicalmente (excluiu todos), volta ao 1
    const currentJogadoresHash = cartelas.map(c => c.id).join(',');
    if (ultimaListaJogadores !== "" && currentJogadoresHash === "" && cartelas.length === 0) {
      numSorteio = 1;
      salvarSorteio();
    }
    ultimaListaJogadores = currentJogadoresHash;
    localStorage.setItem('sx_bingo_jogadores_hash', currentJogadoresHash);

    // --- ÁUDIO DOS NÚMEROS ---
    if (drawn.length > lastDrawnCount) {
      const novoNumero = drawn[drawn.length - 1];
      tocarPing();
      falar("Número " + novoNumero);
    }
    
    lastDrawnCount = drawn.length;
    statusAnterior = g.status;
    render(g);
  });

  function render(g) {
    const drawn = g.drawn || [];
    const cartelas = g.cartelas || [];
    const bar = document.getElementById('statusBar');

    bar.textContent = g.status === 'ativo' ? '🔴 SORTEIO EM ANDAMENTO' : '🏆 SORTEIO FINALIZADO';
    bar.className = 'status-bar ' + (g.status === 'ativo' ? 'ativo' : 'finalizado');

    document.getElementById('bolaGrande').textContent = drawn.length ? drawn[drawn.length-1] : '?';
    document.getElementById('bolasWrap').innerHTML = drawn.map(n => `<div class="bola">${n}</div>`).join('');
    
    document.getElementById('stS').textContent = drawn.length;
    document.getElementById('stR').textContent = 90 - drawn.length;

    document.getElementById('tabelaBody').innerHTML = cartelas.sort((a,b)=>b.score-a.score).map(c => `
      <div class="tabela-row">
        <div style="font-size:10px">C${c.id}</div>
        <div><div class="jogador-foto-vazia">👤</div></div>
        <div class="nome-txt">${c.name || 'Jogador'}</div>
        <div style="font-weight:bold; color:#ffd700">${c.score}/16</div>
      </div>
    `).join('');

    document.getElementById('cartelasGrid').innerHTML = cartelas.map(c => `
      <div class="cartela">
        <div style="font-weight:bold; font-size:12px">CARTELA ${c.id} - ${c.name || ''}</div>
        <div class="cartela-numbers">
          ${(c.numbers || []).map(n => `<div class="num ${(c.markedNumbers || []).includes(n)?'marked':''}">${n}</div>`).join('')}
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
